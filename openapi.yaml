        "400":
          description: Erros de validação (ex. formato de data, e-mail inválido)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                message: "Validation errors"
                errors:
                  - "The 'birth date' field must be a valid date and in the format DD/MM/AAAA."
        "401":
          description: Token ausente ou inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedResponse"
        "404":
          description: Usuário não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
              example:
                message: "User not found"
        "500":
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
              example:
                message: "Internal server error"

  /user/password-update:
    put:
      tags:
        - Users
      summary: Atualizar senha do usuário autenticado
      description: >
        Verifica `currentPassword`, confere `newPassword` com `confirmNewPassword`,
        impede que a nova senha seja igual à antiga e atualiza a senha.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordUpdateRequest"
            examples:
              change:
                value:
                  currentPassword: "OldPass1!"
                  newPassword: "NewPass1!"
                  confirmNewPassword: "NewPass1!"
      responses:
        "200":
          description: Senha atualizada com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
              example:
                message: "Password updated successfully!"
        "400":
          description: Requisição inválida (campos ausentes, senhas não conferem, senha atual incorreta, nova senha igual à antiga)
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/MessageResponse"
                  - $ref: "#/components/schemas/ErrorResponse"
              examples:
                missing_fields:
                  value:
                    message: "All fields are required"
                mismatch:
                  value:
                    message: "Passwords do not match"
                wrong_current:
                  value:
                    message: "Current password is incorrect"
                same_as_old:
                  value:
                    message: "New password cannot be the same as the old password"
        "401":
          description: Token ausente ou inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedResponse"
        "404":
          description: Usuário não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
              example:
                message: "User not found"
        "500":
          description: Erro interno do servidor / erros de validação do model
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /user/delete:
    delete:
      tags:
        - Users
      summary: Deletar conta do usuário autenticado
      description: >
        Recebe a senha no corpo da requisição. Faz verificação de tentativas
        e bloqueio antes de deletar a conta. Em caso de falha na senha, incrementa
        `deleteAttempts` e pode bloquear a conta (24h) após 3 tentativas.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteAccountRequest"
            examples:
              delete_example:
                value:
                  password: "CurrentPass1!"
      responses:
        "200":
          description: Conta deletada com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
              example:
                message: "Account deleted successfully!"
        "400":
          description: Senha não informada ou senha incorreta (com contagem de tentativas)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
              examples:
                missing_password:
                  value:
                    message: "The 'password' field is mandatory"
                incorrect_password:
                  value:
                    message: "Incorrect password, you have 2 more attempts remaining."
        "401":
          description: Token ausente ou inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedResponse"
        "403":
          description: Conta bloqueada após número máximo de tentativas (retorna mensagem com data/hora de desbloqueio)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
              example:
                message: "Account locked until 2025-10-02T14:00:00Z"
        "404":
          description: Usuário não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
              example:
                message: "User not found"
        "500":
          description: Erro interno do servidor / erros de validação
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /project/create:
    post:
      tags:
        - Projects
      summary: Criar um novo projeto e convidar membros
      description: >
        Cria projeto em transação serializável. Valida se cada e-mail do `projectTeam` existe no sistema,
        impede convites duplicados por e-mail e garante que o criador esteja na equipe (como "Moderador") caso não seja incluído.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectCreateRequest"
            example:
              projectName: "Projeto Exemplo"
              description: "Projeto para pesquisa X"
              projectTeam:
                - email: "maria@exemplo.com"
                  roleInProject: "Desenvolvedora"
                - email: "jose@exemplo.com"
                  roleInProject: "Pesquisador"
      responses:
        "201":
          description: Projeto criado com sucesso (retorna projeto, criador e time)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectResponse"
              example:
                project:
                  id: "a1b2c3d4-1111-2222-3333-abcdef123456"
                  projectName: "Projeto Exemplo"
                  description: "Projeto para pesquisa X"
                  status: "active"
                  createdAt: "2025-09-30T12:00:00Z"
                  updatedAt: "2025-09-30T12:00:00Z"
                creator:
                  id: "creator-uuid-1111"
                  fullName: "Carlos Alberto"
                  email: "carlos@exemplo.com"
                  organization: "Universidade X"
                projectTeam:
                  - memberId: "member-uuid-2222"
                    fullName: "Maria Souza"
                    email: "maria@exemplo.com"
                    roleInProject: "Desenvolvedora"
                  - memberId: "creator-uuid-1111"
                    fullName: "Carlos Alberto"
                    email: "carlos@exemplo.com"
                    roleInProject: "Moderador"
        "400":
          description: Requisição inválida (ex. e-mail não encontrado, membro já convidado, validação)
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/MessageResponse"
                  - $ref: "#/components/schemas/ErrorResponse"
              examples:
                missing_field:
                  value:
                    message: "Validation error"
                    errors:
                      - "projectTeam must be a non-empty array"
                email_not_found:
                  value:
                    message: "User with email 'x@exemplo.com' not found."
                already_invited:
                  value:
                    message: "Email address 'x@exemplo.com' has already been invited to the project. Please enter a different email."
        "401":
          description: Token ausente ou inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedResponse"
        "500":
          description: Erro interno do servidor / transação revertida
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /project/owned-projects:
    get:
      tags:
        - Projects
      summary: Listar projetos criados pelo usuário (com paginação, filtros e ordenação)
      description: >
        Retorna projetos cujo `creatorId` é o usuário autenticado.
        Query params: offset, limit, id, status, projectName, orderBy (createdAt|updatedAt), orderDirection (asc|desc).
      security:
        - bearerAuth: []
      parameters:
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
          description: Offset para paginação
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
          description: Limite por página
        - name: id
          in: query
          schema:
            type: string
            format: uuid
          description: Filtrar por ID de projeto
        - name: status
          in: query
          schema:
            type: string
          description: Filtrar por status do projeto
        - name: projectName
          in: query
          schema:
            type: string
          description: Filtro por nome (LIKE)
        - name: orderBy
          in: query
          schema:
            type: string
            enum:
              - createdAt
              - updatedAt
          description: Campo para ordenação
        - name: orderDirection
          in: query
          schema:
            type: string
            enum:
              - asc
              - desc
          description: Direção da ordenação
      responses:
        "200":
          description: Lista paginada de projetos criados pelo usuário
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedProjectsResponse"
              example:
                count: 2
                pagination:
                  offset: 0
                  limit: 10
                projects:
                  - id: "proj-uuid-1"
                    projectName: "Projeto A"
                    description: "Descrição A"
                    status: "active"
                    createdAt: "2025-09-01T10:00:00Z"
                    updatedAt: "2025-09-02T10:00:00Z"
                    creator:
                      id: "creator-uuid-1111"
                      fullName: "Carlos Alberto"
                      email: "carlos@exemplo.com"
                      organization: "Universidade X"
                    projectTeam:
                      - memberId: "member-uuid-2222"
                        fullName: "Maria Souza"
                        email: "maria@exemplo.com"
                        roleInProject: "Desenvolvedora"
                  - id: "proj-uuid-2"
                    projectName: "Projeto B"
                    description: "Descrição B"
                    status: "inactive"
                    createdAt: "2025-08-01T10:00:00Z"
                    updatedAt: "2025-08-02T10:00:00Z"
                    creator:
                      id: "creator-uuid-1111"
                      fullName: "Carlos Alberto"
                      email: "carlos@exemplo.com"
                      organization: "Universidade X"
                    projectTeam: []
        "404":
          description: Nenhum projeto criado pelo usuário
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
              example:
                message: "No user-created projects yet"
        "401":
          description: Token ausente ou inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedResponse"
        "500":
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

