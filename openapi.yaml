openapi: 3.0.1
info:
  title: USARP Tool API
  description: USARP Tool é uma ferramenta de apoio à adoção do método USARP na elicitação e especificação de requisitos de usabilidade em projetos de software.
  version: "1.0.0"
  contact:
    name: USARP Tool Backend Team
    email: usarpback@gmail.com
servers:
  - url: http://localhost:3333
    description: Servidor local de desenvolvimento

tags:
  - name: Auth
    description: Operações de autenticação e recuperação de conta — registro, login, solicitação de recuperação por e-mail e reset de senha usando token curto.
  - name: Users
    description: Operações relacionadas a perfis de usuário — listar usuários (administrativo), obter perfil próprio, atualizar perfil, alterar senha e deletar conta (ações autenticadas).
  - name: Projects
    description: Gerenciamento de projetos - criação em transação, listagem de projetos criados pelo usuário com filtros/paginação, e detalhes de projetos dos quais o usuário é membro.
  - name: UserStories
    description: Criação e listagem de user stories — endpoints suportam criação única e em lote (bulk) e listagem paginada por projeto.
  - name: Brainstorming
    description: Criação de sessões de brainstorming associadas a projetos e user stories, e listagem/contagem das sessões do usuário (inclui user stories relacionadas).

components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: UUID do usuário
        fullName:
          type: string
          description: Nome completo do usuário
        email:
          type: string
          format: email
          description: E-mail do usuário
        gender:
          type: string
          description: Gênero (valores permitidos definidos no model)
          enum:
            - Feminino
            - Masculino
            - Não binário
            - Prefiro não informar
        birthdate:
          type: string
          description: Data de nascimento no formato DD/MM/AAAA
          example: "31/12/1990"
        profile:
          type: string
          description: Perfil do usuário
          enum:
            - Estudante de Graduação
            - Estudante de Pós-Graduação
            - Professor
            - Profissional da Indústria
        organization:
          type: string
          description: Organização / instituição do usuário
        loginAttempts:
          type: integer
          description: Número de tentativas de login falhas
        deleteAttempts:
          type: integer
          description: Número de tentativas de remoção falhas
        lockUntil:
          type: string
          format: date-time
          description: Data/hora até a qual a conta está bloqueada (se aplicável)
      required:
        - id
        - fullName
        - email
        - gender
        - birthdate
        - profile
        - organization

    UsersListResponse:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/User"

    UpdateUserRequest:
      type: object
      description: Campos que podem ser atualizados. Campos omitidos serão mantidos.
      properties:
        fullName:
          type: string
          example: "João Atualizado"
        email:
          type: string
          format: email
          example: "joao.atualizado@exemplo.com"
        gender:
          type: string
          enum:
            - Feminino
            - Masculino
            - Não binário
            - Prefiro não informar
        birthdate:
          type: string
          example: "02/02/2000"
        profile:
          type: string
          enum:
            - Estudante de Graduação
            - Estudante de Pós-Graduação
            - Professor
            - Profissional da Indústria
        organization:
          type: string
          example: "Universidade Atualizada"

    PasswordUpdateRequest:
      type: object
      properties:
        currentPassword:
          type: string
          example: "OldPass1!"
        newPassword:
          type: string
          description: >-
            Nova senha (8-15 caracteres, pelo menos 1 minúscula, 1 maiúscula,
            1 número, 1 caractere especial, sem espaços).
          example: "NewPass1!"
        confirmNewPassword:
          type: string
          example: "NewPass1!"
      required:
        - currentPassword
        - newPassword
        - confirmNewPassword

    DeleteAccountRequest:
      type: object
      properties:
        password:
          type: string
          example: "CurrentPass1!"
      required:
        - password

    SignupRequest:
      type: object
      properties:
        fullName:
          type: string
          description: Nome completo (apenas letras e espaços)
          example: "João da Silva"
        email:
          type: string
          format: email
          example: "joao.silva@exemplo.com"
        password:
          type: string
          description: >-
            Senha (8-15 caracteres, pelo menos 1 minúscula, 1 maiúscula, 1 número,
            1 caractere especial, sem espaços)
          example: "Abcdef1!"
        gender:
          type: string
          enum:
            - Feminino
            - Masculino
            - Não binário
            - Prefiro não informar
          example: "Prefiro não informar"
        birthdate:
          type: string
          description: Formato DD/MM/AAAA
          example: "01/01/2000"
        profile:
          type: string
          enum:
            - Estudante de Graduação
            - Estudante de Pós-Graduação
            - Professor
            - Profissional da Indústria
          example: "Estudante de Graduação"
        organization:
          type: string
          example: "Universidade X"
      required:
        - fullName
        - email
        - password
        - gender
        - birthdate
        - profile
        - organization

    SigninRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          example: "joao.silva@exemplo.com"
        password:
          type: string
          example: "Abcdef1!"
      required:
        - email
        - password

    AuthResponse:
      type: object
      properties:
        token:
          type: string
          description: JWT para autenticação em rotas protegidas

    ForgotPasswordRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          example: "joao.silva@exemplo.com"
      required:
        - email

    ResetPasswordRequest:
      type: object
      properties:
        password:
          type: string
          description: Nova senha (mesmas regras de validação do model)
          example: "NewPass1!"
      required:
        - password

    MessageResponse:
      type: object
      properties:
        message:
          type: string

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
        errors:
          type: array
          items:
            type: string

    UnauthorizedResponse:
      type: object
      properties:
        message:
          type: string
      example:
        message: "Unauthorized - token is missing or invalid"

    Project:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: "a1b2c3d4-1111-2222-3333-abcdef123456"
        projectName:
          type: string
          example: "Sistema de Recomendação"
        description:
          type: string
          example: "Projeto sobre recomendação de conteúdo usando ML"
        creatorId:
          type: string
          format: uuid
        status:
          type: string
          example: "active"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ProjectTeamMember:
      type: object
      properties:
        memberId:
          type: string
          format: uuid
          example: "f1e2d3c4-aaaa-bbbb-cccc-1234567890ab"
        fullName:
          type: string
          example: "Maria Souza"
        email:
          type: string
          format: email
          example: "maria.souza@exemplo.com"
        roleInProject:
          type: string
          example: "Desenvolvedor"

    AddProjectMemberRequest:
      type: object
      properties:
        memberEmail:
          type: string
          format: email
          example: "usuario@example.com"
      required:
        - memberEmail

    UpdateProjectMemberRoleRequest:
      type: object
      properties:
        roleInProject:
          type: string
          example: "Moderador"
      required:
        - roleInProject

    CreatorSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        fullName:
          type: string
        email:
          type: string
          format: email
        organization:
          type: string

    BrainstormingSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        userStoriesCount:
          type: integer
          example: 3

    ProjectCreateRequest:
      type: object
      description: Payload para criação de projeto com time (projectTeam)
      properties:
        projectName:
          type: string
          example: "Sistema de Recomendação"
        description:
          type: string
          example: "Descrição do projeto..."
        projectTeam:
          type: array
          description: Lista de membros a convidar no formato { email, roleInProject }
          items:
            type: object
            properties:
              email:
                type: string
                format: email
                example: "membro@exemplo.com"
              roleInProject:
                type: string
                example: "Desenvolvedor"
      required:
        - projectName
        - description
        - projectTeam

    ProjectResponse:
      type: object
      properties:
        project:
          $ref: "#/components/schemas/Project"
        creator:
          $ref: "#/components/schemas/CreatorSummary"
        projectTeam:
          type: array
          items:
            $ref: "#/components/schemas/ProjectTeamMember"

    PaginatedProjectsResponse:
      type: object
      properties:
        count:
          type: integer
          description: total de projetos encontrados
        pagination:
          type: object
          properties:
            offset:
              type: integer
            limit:
              type: integer
        projects:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              projectName:
                type: string
              description:
                type: string
              status:
                type: string
              createdAt:
                type: string
                format: date-time
              updatedAt:
                type: string
                format: date-time
              creator:
                $ref: "#/components/schemas/CreatorSummary"
              projectTeam:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectTeamMember"

    ProjectsDetailsResponse:
      type: object
      properties:
        projects:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              projectName:
                type: string
              description:
                type: string
              status:
                type: string
              createdAt:
                type: string
                format: date-time
              updatedAt:
                type: string
                format: date-time
              creator:
                $ref: "#/components/schemas/CreatorSummary"
              projectTeam:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectTeamMember"
              brainstormingsCount:
                type: integer
              userStoriesCount:
                type: integer
              brainstormings:
                type: array
                items:
                  $ref: "#/components/schemas/BrainstormingSummary"
        pagination:
          type: object
          properties:
            offset:
              type: integer
            limit:
              type: integer
            total:
              type: integer

    UserStory:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: "us-123e4567-e89b-12d3-a456-426614174000"
        userStorieNumber:
          type: integer
          example: 1
        userStoriesTitle:
          type: string
          example: "Como usuário, quero autenticar-me no sistema"
        card:
          type: string
          description: Texto do cartão (opcional)
          example: "Cartão: Login"
        conversation:
          type: string
          description: Notas da conversa (opcional)
          example: "Discussão sobre critérios de aceitação"
        confirmation:
          type: string
          description: Critérios de aceitação / confirmação (opcional)
          example: "Deve permitir login com e-mail e senha"
        status:
          type: string
          example: "open"
        creatorId:
          type: string
          format: uuid
          description: UUID do usuário que criou a user story
        projectId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - userStorieNumber
        - userStoriesTitle
        - projectId
        - creatorId

    UserStoryCreate:
      type: object
      properties:
        userStorieNumber:
          type: integer
          example: 1
        userStoriesTitle:
          type: string
          example: "Como usuário, quero X"
        card:
          type: string
          example: "Cartão exemplo"
        conversation:
          type: string
          example: "Conversa exemplo"
        confirmation:
          type: string
          example: "Critério de aceitação exemplo"
        projectId:
          type: string
          format: uuid
          example: "proj-123e4567-e89b-12d3-a456-426614174000"
      required:
        - userStorieNumber
        - userStoriesTitle
        - projectId

    BulkUserStoriesRequest:
      type: object
      description: Requisição para inserir várias user stories de uma vez
      properties:
        projectId:
          type: string
          format: uuid
          example: "proj-123e4567-e89b-12d3-a456-426614174000"
        userStories:
          type: array
          items:
            type: object
            properties:
              userStorieNumber:
                type: integer
                example: 1
              userStoriesTitle:
                type: string
                example: "Como usuário, quero X"
              card:
                type: string
              conversation:
                type: string
              confirmation:
                type: string
            required:
              - userStorieNumber
              - userStoriesTitle
      required:
        - projectId
        - userStories

    PaginatedUserStoriesResponse:
      type: object
      properties:
        projectId:
          type: string
          format: uuid
        sort:
          type: string
          enum:
            - asc
            - desc
        userStories:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              userStorieNumber:
                type: integer
              userStoriesTitle:
                type: string
              status:
                type: string
              createdAt:
                type: string
                format: date-time
        pagination:
          type: object
          properties:
            page:
              type: integer
            pageSize:
              type: integer
            totalPages:
              type: integer
            totalItems:
              type: integer

    UserStorySummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: "us-123e4567-e89b-12d3-a456-426614174000"
        userStorieNumber:
          type: integer
          example: 1
        userStoriesTitle:
          type: string
          example: "Como usuário, quero autenticar-me"
        status:
          type: string
          example: "open"
        createdAt:
          type: string
          format: date-time

    BrainstormingCreateRequest:
      type: object
      description: Payload para criar uma sessão de brainstorming. `project` deve ser UUID do projeto.
      properties:
        brainstormingTitle:
          type: string
          example: "Sessão inicial - Login"
        project:
          type: string
          format: uuid
          description: UUID do projeto (campo `project` no controller)
          example: "proj-123e4567-e89b-12d3-a456-426614174000"
        brainstormingDate:
          type: string
          description: Data no formato desejado pela aplicação (ex. YYYY-MM-DD)
          example: "2025-10-01"
        brainstormingTime:
          type: string
          description: Hora (ex. HH:mm)
          example: "14:00"
        userStories:
          type: array
          description: Array de UUIDs de user stories que serão associadas à sessão
          items:
            type: string
            format: uuid
          example:
            - "us-123e4567-e89b-12d3-a456-426614174000"
            - "us-987e6543-e21b-12d3-a456-426614174999"
      required:
        - brainstormingTitle
        - project
        - userStories

    Brainstorming:
      type: object
      description: Representação de uma sessão de brainstorming (inclui user stories associadas).
      properties:
        id:
          type: string
          format: uuid
          example: "br-123e4567-e89b-12d3-a456-426614174000"
        brainstormingTitle:
          type: string
          example: "Sessão inicial - Login"
        projectId:
          type: string
          format: uuid
          example: "proj-123e4567-e89b-12d3-a456-426614174000"
        creatorId:
          type: string
          format: uuid
          example: "creator-uuid-1111"
        brainstormingDate:
          type: string
          example: "2025-10-01"
        brainstormingTime:
          type: string
          example: "14:00"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        userStories:
          type: array
          items:
            $ref: "#/components/schemas/UserStorySummary"

    BrainstormingsFindAndCount:
      type: object
      properties:
        count:
          type: integer
          example: 2
        rows:
          type: array

    BrainstormingAssociations:
      type: object
      properties:
        project:
          type: object
          nullable: true
          properties:
            id:
              type: string
              format: uuid
            projectName:
              type: string
          description: Projeto vinculado (se houver)
        userStories:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              title:
                type: string
          description: Lista de user stories vinculadas ao brainstorming

    UpdateBrainstormingStatusRequest:
      type: object
      properties:
        status:
          type: string
          enum:
            - Novo
            - Bloqueado
            - Concluído/Encerrado
      required:
        - status

    StatusUpdateResponse:
      type: object
      properties:
        message:
          type: string
        brainstorming:
          $ref: '#/components/schemas/Brainstorming'
          items:
            $ref: "#/components/schemas/Brainstorming"

    BrainstormingStatusHelpResponse:
      type: object
      properties:
        statuses:
          type: array
          items:
            type: object
            properties:
              status:
                type: string
                enum:
                  - Novo
                  - Bloqueado
                  - Concluído/Encerrado
              description:
                type: string
          description: Lista de status possíveis e suas descrições

    BrainstormingChecklistUpdateRequest:
      type: object
      description: >-
        Payload para atualizar o(s) checklist(s) de um brainstorming.
        Pode ser um array de objetos `{ userStoryId, checklist }` ou um objeto mapping
        onde as chaves são `userStoryId` e os valores o `checklist` correspondente.
      oneOf:
        - type: array
          items:
            $ref: '#/components/schemas/ChecklistUpdateItem'
        - type: object
          additionalProperties:
            $ref: '#/components/schemas/ChecklistSchema'

    ChecklistUpdateItem:
      type: object
      properties:
        userStoryId:
          type: string
          format: uuid
        checklist:
          $ref: '#/components/schemas/ChecklistSchema'
      required:
        - userStoryId
        - checklist

    ChecklistSchema:
      description: Estrutura livre que representa o checklist salvo para uma associação userStory-brainstorming.
      type: object
      additionalProperties:
        description: Pode ser um array de subitens selecionados ou objeto com detalhes
        oneOf:
          - type: array
            items:
              type: string
          - type: object
            additionalProperties:
              type: boolean

    BrainstormingChecklistUpdateResponse:
      type: object
      properties:
        message:
          type: string
        results:
          type: array
          items:
            $ref: '#/components/schemas/ChecklistUpdateResult'
        recommendedCards:
          type: object
          description: Mapeamento entre `userStoryId` e array de grupos de recomendações geradas.
          additionalProperties:
            type: array
            items:
              $ref: '#/components/schemas/MechanismGroup'

    ChecklistUpdateResult:
      type: object
      properties:
        userStoryId:
          type: string
          format: uuid
        updated:
          type: boolean
        reason:
          type: string

    MechanismGroup:
      type: object
      properties:
        type:
          type: string
          example: "MECANISMO_HEADER"
        name:
          type: string
          description: "Nome do mecanismo (ex: Feedback do sistema)"
        cards:
          type: array
          items:
            $ref: '#/components/schemas/RecommendedCard'

    RecommendedCard:
      type: object
      properties:
        codigo:
          type: string
        descricao:
          type: string
        userStoryId:
          type: string
          format: uuid
    
    UpdateUserStoriesOrderRequest:
      type: object
      properties:
        orderedUserStoriesID:
          type: array
          items:
            type: string
            format: uuid
          description: Array com os IDs das histórias de usuário na ordem desejada (máximo 3 histórias por vez)
      required:
        - orderedUserStoriesID
    
    Note:
      type: object
      properties:
        id:
          type: string
          format: uuid
        brainstormingId:
          type: string
          format: uuid
        userStoryId:
          type: string
          format: uuid
        cardCode:
          type: string
        text:
          type: string
        authorId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time


  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

paths:
  /auth/signup:
    post:
      tags:
        - Auth
      summary: Cadastrar novo usuário
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
      responses:
        "201":
          description: Usuário criado com sucesso (sem senha retornada)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
              example:
                id: "e7b8c9d2-1a2b-4c3d-9f0a-123456789abc"
                fullName: "João da Silva"
                email: "joao.silva@exemplo.com"
                gender: "Prefiro não informar"
                birthdate: "01/01/2000"
                profile: "Estudante de Graduação"
                organization: "Universidade X"
                loginAttempts: 0
                deleteAttempts: 0
        "400":
          description: Erros de validação
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                message: "Validation errors"
                errors:
                  - "The 'email' field is required."
                  - "The password must be at least 8 and at most 15 characters long..."
        "500":
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
              example:
                message: "Internal server error"

  /auth/signin:
    post:
      tags:
        - Auth
      summary: Autenticar usuário e obter token JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SigninRequest"
      responses:
        "200":
          description: Autenticação bem-sucedida — retorna token JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
              example:
                token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        "400":
          description: Credenciais inválidas / usuário não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
              example:
                message: "Invalid email and/or password"
        "403":
          description: Conta bloqueada por tentativas excessivas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
              example:
                message: "Account locked until 2025-10-01T14:52:00Z"
        "500":
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
              example:
                message: "Internal server error"

  /auth/forgot_password:
    post:
      tags:
        - Auth
      summary: Solicitar recuperação de senha (envia e-mail com link)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
      responses:
        "200":
          description: E-mail de recuperação enviado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
              example:
                message: "The recovery email was sent to the user"
        "400":
          description: E-mail inválido (usuário não encontrado)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
              example:
                message: "Invalid email"
        "500":
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
              example:
                message: "Internal server error"

  /auth/reset_password/{userId}/{token}:
    post:
      tags:
        - Auth
      summary: Resetar senha usando token enviado por e-mail
      parameters:
        - name: userId
          in: path
          required: true
          description: UUID do usuário (parâmetro userId usado no link de reset)
          schema:
            type: string
            format: uuid
            example: "e7b8c9d2-1a2b-4c3d-9f0a-123456789abc"
        - name: token
          in: path
          required: true
          description: Token de reset (JWT curto gerado pelo método generateToken("30m"))
          schema:
            type: string
            example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "200":
          description: Senha resetada com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
              example:
                message: "The password was successfully reset"
        "400":
          description: Token inválido ou expirado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
              examples:
                invalid_token:
                  value:
                    message: "Invalid token"
                token_expired:
                  value:
                    message: "Token expired"
        "404":
          description: Usuário não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
              example:
                message: "User not found"
        "500":
          description: Erro interno do servidor / Erros de validação
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                message: "Validation errors"
                errors:
                  - "The 'birth date' field must be a valid date and in the format DD/MM/AAAA."

  /users:
    get:
      tags:
        - Users
      summary: Listar todos os usuários (sem senha)
      description: >
        Retorna todos os usuários cadastrados. O campo `password` não é
        retornado por motivos de segurança.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Lista de usuários retornada com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsersListResponse"
              examples:
                sample:
                  value:
                    users:
                      - id: "e7b8c9d2-1a2b-4c3d-9f0a-123456789abc"
                        fullName: "João da Silva"
                        email: "joao.silva@exemplo.com"
                        gender: "Prefiro não informar"
                        birthdate: "01/01/2000"
                        profile: "Estudante de Graduação"
                        organization: "Universidade X"
                        loginAttempts: 0
                        deleteAttempts: 0
        "401":
          description: Token ausente ou inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedResponse"
        "500":
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
              example:
                message: "Internal server error"

  /user:
    get:
      tags:
        - Users
      summary: Retornar perfil do usuário autenticado
      description: >
        Usa `request.userId` (preenchido pelo middleware de autenticação)
