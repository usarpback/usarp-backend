  /userstories/register:
    post:
      tags:
        - UserStories
      summary: Criar user story (single) ou várias user stories (bulk)
      description: >
        Este endpoint aceita **criação única** ou **bulk**:
        - Para criar uma única user story, envie o corpo conforme `UserStoryCreate`.
        - Para criar várias user stories de uma vez, envie um objeto com `projectId` e `userStories` (array) conforme `BulkUserStoriesRequest`.
        (No código do router existem duas handlers apontando para a mesma rota — aqui unificamos o comportamento suportando ambos os formatos.)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/UserStoryCreate"
                - $ref: "#/components/schemas/BulkUserStoriesRequest"
            examples:
              single:
                summary: Criar uma única user story
                value:
                  userStorieNumber: 1
                  userStoriesTitle: "Como usuário, quero autenticar"
                  card: "Cartão: Login"
                  conversation: "Detalhes da conversa"
                  confirmation: "Aceitação: login com e-mail e senha"
                  projectId: "proj-123e4567-e89b-12d3-a456-426614174000"
              bulk:
                summary: Criar várias user stories
                value:
                  projectId: "proj-123e4567-e89b-12d3-a456-426614174000"
                  userStories:
                    - userStorieNumber: 1
                      userStoriesTitle: "Como usuário, quero autenticar"
                      card: "Cartão: Login"
                    - userStorieNumber: 2
                      userStoriesTitle: "Como usuário, quero recuperar senha"
      responses:
        "201":
          description: User story(s) criado(s) com sucesso
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/UserStory" # single create returns a user story
                  - type: array
                    items:
                      $ref: "#/components/schemas/UserStory" # bulk create returns an array
              examples:
                created_single:
                  value:
                    id: "us-123e4567-e89b-12d3-a456-426614174000"
                    userStorieNumber: 1
                    userStoriesTitle: "Como usuário, quero autenticar"
                    card: "Cartão: Login"
                    conversation: "Detalhes"
                    confirmation: "Critérios"
                    status: "open"
                    creatorId: "creator-uuid-1111"
                    projectId: "proj-123e4567-e89b-12d3-a456-426614174000"
                    createdAt: "2025-10-01T10:00:00Z"
                created_bulk:
                  value:
                    - id: "us-aaa111"
                      userStorieNumber: 1
                      userStoriesTitle: "Story 1"
                      projectId: "proj-123"
                      creatorId: "creator-uuid-1111"
                    - id: "us-bbb222"
                      userStorieNumber: 2
                      userStoriesTitle: "Story 2"
                      projectId: "proj-123"
                      creatorId: "creator-uuid-1111"
        "400":
          description: Requisição inválida (campos obrigatórios ausentes, validação ou erro custom lançado)
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/MessageResponse"
                  - $ref: "#/components/schemas/ErrorResponse"
              examples:
                missing_projectId:
                  value:
                    message: "The 'projectId' field is required and must reference an existing project."
                validation_error:
                  value:
                    message: "Validation error"
                    errors:
                      - "userStoriesTitle cannot be empty"
                custom_map_error:
                  value:
                    message: "All stories must have 'userStorieNumber' and 'userStoriesTitle'."
        "404":
          description: Projeto não encontrado (apenas aplicável no fluxo bulk / create)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
              example:
                message: "No project found with id 'proj-123'."
        "401":
          description: Token ausente ou inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedResponse"
        "500":
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
              example:
                message: "Internal server error"

  /userstories/{projectId}/user-stories:
    get:
      tags:
        - UserStories
      summary: Listar user stories de um projeto (paginado)
      description: >
        Retorna as user stories do projeto identificado por `projectId`.
        Requer que o usuário seja membro do projeto (`ProjectUser`) ou seja o criador do projeto.
        Query params suportados: `page` (padrão 1), `pageSize` (padrão 10), `sort` (asc|desc, padrão asc).
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          description: UUID do projeto
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
          description: Número da página
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            default: 10
          description: Tamanho da página
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum:
              - asc
              - desc
            default: asc
          description: Ordenação por `userStorieNumber`
      responses:
        "200":
          description: Lista paginada de user stories (apenas campos resumidos)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedUserStoriesResponse"
              example:
                projectId: "proj-123e4567-e89b-12d3-a456-426614174000"
                sort: "asc"
                userStories:
                  - id: "us-123"
                    userStorieNumber: 1
                    userStoriesTitle: "Story 1"
                    status: "open"
                    createdAt: "2025-10-01T10:00:00Z"
                  - id: "us-456"
                    userStorieNumber: 2
                    userStoriesTitle: "Story 2"
                    status: "open"
                    createdAt: "2025-10-02T10:00:00Z"
                pagination:
                  page: 1
                  pageSize: 10
                  totalPages: 1
                  totalItems: 2
        "400":
          description: Parâmetro `sort` inválido ou outro erro de validação
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
              example:
                message: "Invalid sort parameter; must be 'asc' or 'desc'."
        "403":
          description: Usuário não tem permissão para ver as user stories (não é membro nem criador)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
              example:
                message: "You do not have permission to view those user stories."
        "404":
          description: Projeto não encontrado ou não há user stories para o projeto
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
              examples:
                project_not_found:
                  value:
                    message: "Project with id 'proj-123' not found."
                no_stories:
                  value:
                    message: "No user stories found for this project."
        "401":
          description: Token ausente ou inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedResponse"
        "500":
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
              example:
                message: "Internal server error"

  /userstories/{id}:
    delete:
      tags:
        - UserStories
      summary: Deletar uma história de usuário
      description: >-
        Deleta uma história de usuário se o solicitante for o criador da história
        ou um Moderador do projeto. A exclusão não é permitida quando houver
        vínculos ativos com sessões de brainstorming — remova-os antes de excluir.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: UUID da user story a ser excluída
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: User story deleted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
              example:
                message: "User story deleted successfully."
        "403":
          description: Deleção proibida (não autorizado ou possui associações ativas)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
              examples:
                not_authorized:
                  value:
                    message: "You do not have permission to delete this user story. Only the creator or project moderators can delete it."
                has_associations:
                  value:
                    message: "A exclusão não é permitida. Esta História de Usuário possui 2 vínculo(s) ativo(s) com sessão(ões) de brainstorming. Remova o vínculo primeiro."
                    hasActiveBrainstormingLink: true
        "404":
          description: User story not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
              example:
                message: "User story with id 'us-123' not found."
        "401":
          description: Token missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
    put:
      tags:
        - UserStories
      summary: Atualizar uma história de usuário (reabrir antes se concluída)
      description: >
        Atualiza uma história de usuário pelo ID.
        - Apenas membros do projeto com papel **'Moderador'** podem atualizar.
        - Se a história de usuário estiver com status **'Concluída'**, ela deve ser **reaberta primeiro** alterando o status para **'Ativo'**.
        - Todos os campos obedecem às Regras de Negócio 16.1 a 16.6.
        - O sistema notificará os membros do projeto sobre as alterações (RN 18.2).
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: UUID of the user story to update
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userStorieNumber:
                  type: integer
                  description: "Número sequencial da história de usuário"
                  example: 3
                userStoriesTitle:
                  type: string
                  description: "Título da história de usuário"
                  example: "Cadastrar autenticação no sistema"
                card:
                  type: string
                  description: "Descrição estruturada seguindo o template 'Como [persona], quero [objetivo] para [benefício]'."
                  example: "Como usuário, quero fazer login no sistema para acessar funcionalidades privadas."
                conversation:
                  type: string
                  description: "Notas de colaboração, esclarecimentos e discussões sobre aceitação."
                  example: "Backend deve validar credenciais via JWT e consultar o banco de dados para autenticação."
                confirmation:
                  type: string
                  description: "Critérios de aceitação"
                  example: "Dado um usuário válido, quando fizer login com credenciais corretas, então deve ser redirecionado para /dashboard."
                status:
                  type: string
                  enum: ["Ativo", "Inativo"]
                  description: "Status atual da história de usuário"
                  example: "Ativo"
            examples:
              reopen_story:
                summary: "Reabrir história concluída"
                value:
                  status: "Ativo"
              full_update:
                summary: "Atualização completa"
                value:
                  userStorieNumber: 4
                  userStoriesTitle: "Alterar design da dashboard"
                  card: "Como administrador, quero alterar o visual da dashboard para melhorar a usabilidade." 
                  conversation: "A equipe de frontend (React) fará ajustes no CSS e componentes; backend não é afetado."
                  confirmation: "Dado o novo layout aplicado, o sistema deve manter todas as funcionalidades existentes e exibir corretamente em mobile."
                  status: "Ativo"
      responses:
        "200":
          description: User story updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserStory"
        "400":
          description: Invalid request or trying to update inactive user story
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          description: Token missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedResponse"
        "403":
          description: User lacks permissions (not a project moderator)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          description: User story not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

