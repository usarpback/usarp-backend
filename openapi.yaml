                id: "e7b8c9d2-1a2b-4c3d-9f0a-123456789abc"
                fullName: "João da Silva"
                email: "joao.silva@exemplo.com"
                gender: "Prefiro não informar"
                birthdate: "01/01/2000"
                profile: "Estudante de Graduação"
                organization: "Universidade X"
                loginAttempts: 0
                deleteAttempts: 0
        "401":
          description: Token ausente ou inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedResponse"
        "404":
          description: Usuário não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
              example:
                message: "User not found"
        "500":
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
              example:
                message: "Internal server error"

    put:
      tags:
        - Users
      summary: Atualizar dados básicos do perfil do usuário autenticado
      description: >
        Atualiza os campos enviados no corpo. Campos omitidos permanecem com
        os valores atuais. Validações do model podem retornar 400 com lista de erros.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
