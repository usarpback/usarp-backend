      description: |
        Retorna `findAndCountAll` de brainstormings cujo `creatorId` é o usuário autenticado,
        incluindo as user stories relacionadas. Ordena por `createdAt` DESC.
        Retorna 404 se não houver brainstormings criadas pelo usuário.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Retorna objeto com `count` e `rows` (lista de brainstormings com userStories incluídas)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrainstormingsFindAndCount"
              example:
                count: 1
                rows:
                  - id: "br-123e4567-e89b-12d3-a456-426614174000"
                    brainstormingTitle: "Sessão 1 - Critérios de Login"
                    projectId: "proj-123e4567-e89b-12d3-a456-426614174000"
                    creatorId: "creator-uuid-1111"
                    brainstormingDate: "2025-10-01"
                    brainstormingTime: "14:00"
                    createdAt: "2025-10-01T14:00:00Z"
                    updatedAt: "2025-10-01T14:00:00Z"
                    userStories:
                      - id: "us-123e4567-e89b-12d3-a456-426614174000"
                        userStorieNumber: 1
                        userStoriesTitle: "Como usuário, quero autenticar"
                        status: "open"
                        createdAt: "2025-09-30T10:00:00Z"
        "404":
          description: Nenhuma brainstorming criada pelo usuário
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
              example:
