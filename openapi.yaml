                brainstormingTitle: "Sessão 1 - Critérios de Login"
                projectId: "proj-123e4567-e89b-12d3-a456-426614174000"
                creatorId: "creator-uuid-1111"
                brainstormingDate: "2025-10-01"
                brainstormingTime: "14:00"
                createdAt: "2025-10-01T14:00:00Z"
                updatedAt: "2025-10-01T14:00:00Z"
                userStories:
