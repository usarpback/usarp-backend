        - bearerAuth: []
      parameters:
        - name: brainstormingId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID do brainstorming a ser atualizado
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BrainstormingChecklistUpdateRequest'
      responses:
        "200":
          description: Checklist atualizado e recomendações geradas com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrainstormingChecklistUpdateResponse'
        "400":
          description: Requisição inválida (formato do payload incorreto)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "403":
          description: Usuário não tem permissão (não é Moderador)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedResponse'
        "404":
          description: Brainstorming ou associação não encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  
