      responses:
        "200":
          description: Usuário atualizado com sucesso (retorna usuário sem senha)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
              example:
                id: "e7b8c9d2-1a2b-4c3d-9f0a-123456789abc"
                fullName: "João Atualizado"
                email: "joao.silva@exemplo.com"
                gender: "Prefiro não informar"
                birthdate: "01/01/2000"
                profile: "Estudante de Graduação"
